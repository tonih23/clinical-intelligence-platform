# ============================================================
# Clinical Intelligence Platform — stack local de Sprint 1
#
# Levanta tres servicios:
#   - postgres : base de datos relacional (papers, ingest_runs)
#   - minio    : object storage compatible con S3 (XML crudo)
#   - api      : la aplicación FastAPI
#
# Uso:
#   docker compose up -d --build
#   docker compose logs -f api
#   docker compose down            (mantiene los volúmenes)
#   docker compose down -v         (los borra también)
# ============================================================

services:
  postgres:
    image: postgres:16-alpine
    container_name: cip-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cip}
      POSTGRES_USER: ${POSTGRES_USER:-cip}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cip_dev_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cip} -d ${POSTGRES_DB:-cip}"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    container_name: cip-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"   # API S3
      - "9001:9001"   # Consola web
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Crea el bucket al arrancar (one-shot)
  minio-init:
    image: minio/mc:RELEASE.2024-10-08T09-37-26Z
    container_name: cip-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${S3_ACCESS_KEY:-minioadmin} ${S3_SECRET_KEY:-minioadmin};
      mc mb --ignore-existing local/${S3_BUCKET:-pubmed-raw};
      mc anonymous set download local/${S3_BUCKET:-pubmed-raw};
      echo 'Bucket ${S3_BUCKET:-pubmed-raw} listo';
      exit 0;
      "

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cip-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "${API_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  minio_data:
