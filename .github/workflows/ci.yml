name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.4"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: |
          uv venv
          uv pip install -e ".[dev]"

      - name: Lint with ruff
        run: |
          source .venv/bin/activate
          ruff check src tests

      - name: Type check with mypy
        run: |
          source .venv/bin/activate
          mypy src
        continue-on-error: true   # warning-only en Sprint 1; estricto desde Sprint 5

      - name: Run tests
        run: |
          source .venv/bin/activate
          pytest -v --cov=cip --cov-report=term
